name: Build and Deploy

# Триггеры: при пуше в main или ручной запуск
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# Глобальные переменные
env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/hello-ci-cd

jobs:
  # ========== JOB 1: Docker Hub ==========
  docker-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t ${{ env.DOCKER_IMAGE }}:latest .
          docker tag ${{ env.DOCKER_IMAGE }}:latest ${{ env.DOCKER_IMAGE }}:${{ github.run_id }}

      - name: Push to Docker Hub
        run: |
          docker push ${{ env.DOCKER_IMAGE }}:latest
          docker push ${{ env.DOCKER_IMAGE }}:${{ github.run_id }}

      - name: Hello World message
        run: echo "✅ Docker image pushed to ${{ env.DOCKER_IMAGE }}"

  # ========== JOB 2: GitHub Pages ==========
  pages-job:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'  # загружаем всю папку (там есть index.html)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Hello World message
        run: echo "🌐 Pages deployed to ${{ steps.deployment.outputs.page_url }}"